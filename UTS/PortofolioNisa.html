        function renderPage(pageKey) {
            const pageData = pages[pageKey];
            if (!pageData) return;

            // 1. Perbarui Konten Utama dengan animasi fade-in
            contentArea.innerHTML = `
                <section class="bg-white p-8 sm:p-10 rounded-3xl shadow-2xl animate-fade-in border-t-8 border-teal-500">

            `;

            // Jika halaman portofolio, inisialisasi tab
            if (pageKey === 'portfolio') {
                showPortfolioTab('poster'); // Default ke tab Poster Design
            }

            // 2. Perbarui Kelas Navigasi
            navLinks.forEach(link => {
                link.classList.remove('active');
                if (link.id === `nav-${pageKey}`) {
                    link.classList.add('active');
                }
            });

            // 3. Perbarui URL
            const urlTitle = pageData.title.split(' ')[0] + '-' + pageKey;
            history.pushState({ page: pageKey }, pageData.title, `#${pageKey}`);
            document.title = "Portofolio | " + pageData.title.split(' ')[0];
        }

         */

            const tabContentArea = document.getElementById('portfolio-tab-content');
            
            // 1. Perbarui Konten
            if (tabContentArea) {
                // Tambahkan animasi fade-out singkat sebelum fade-in konten baru

                tabContentArea.innerHTML = portfolioContent[tabKey];

            }

            // 2. Perbarui Tombol Aktif
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active-tab');
            });
            const activeBtn = document.getElementById(`tab-${tabKey}`);
            if (activeBtn) {
                activeBtn.classList.add('active-tab');
            }
        }
